name: Update Mods & Export Pack

on:
  # Ejecutar automáticamente cada lunes a las 6am UTC
  schedule:
    - cron: "0 6 * * 1"
  # También se puede ejecutar manualmente desde la pestaña Actions
  workflow_dispatch:
    inputs:
      skip_update:
        description: "Saltear la actualización de mods (solo exportar)"
        required: false
        default: "false"
        type: boolean

jobs:
  update-and-export:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CF_API_KEY: ${{ secrets.CF_API_KEY }}

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Instalar packwiz
        run: go install github.com/packwiz/packwiz@latest

      - name: Actualizar todos los mods
        if: ${{ inputs.skip_update != 'true' }}
        run: packwiz update --all -y

      - name: Refrescar índice
        run: packwiz refresh

      - name: Verificar si hay cambios
        id: changes
        run: |
          git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit de mods actualizados
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: actualizar mods [automated]"
          git push

      - name: Exportar pack para CurseForge
        run: packwiz curseforge export

      - name: Exportar pack para Modrinth
        run: packwiz modrinth export

      - name: Obtener versión del pack
        id: version
        run: |
          VERSION=$(grep '^version' pack.toml | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Subir archivos exportados como Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}-${{ github.run_number }}
          name: "Falopacraft v${{ steps.version.outputs.version }} (build ${{ github.run_number }})"
          body: |
            ## Falopacraft Modpack

            Descargá el archivo `.zip` para instalarlo en CurseForge o en tu launcher favorito.

            > Build generado automáticamente por GitHub Actions.
          files: |
            *.zip
          draft: false
          prerelease: false
